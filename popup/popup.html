<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HiddenThings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="dot"></span>
        <h1>HiddenThings</h1>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="theme-btn" type="button" title="Toggle theme">☾</button>
        <button id="settingsToggle" class="theme-btn" type="button" title="Settings">⚙</button>
        <label class="switch" title="Automatically scan every site you visit">
          <input type="checkbox" id="autoScanToggle" />
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-row">
        <label for="fontSizeSelect">Text size</label>
        <select id="fontSizeSelect">
          <option value="small">Small</option>
          <option value="normal">Normal</option>
          <option value="large">Large</option>
          <option value="xlarge">Extra large</option>
        </select>
      </div>
      <div class="settings-row">
        <label for="accentColorInput">Accent color</label>
        <input type="color" id="accentColorInput" />
      </div>
      <div class="settings-row">
        <label for="popupSizeSelect">Popup size</label>
        <select id="popupSizeSelect">
          <option value="compact">Compact</option>
          <option value="normal">Normal</option>
          <option value="large">Large</option>
          <option value="xlarge">Extra large</option>
        </select>
      </div>
    </div>

    <div class="target-origin" id="targetOrigin">—</div>

    <main id="resultsList" class="results"></main>

    <button id="manualScanBtn" class="scan-btn hidden" type="button">
      Rescan
    </button>

    <div class="advanced-section">
      <div class="advanced-header">
        <span class="section-title">Advanced Recon</span>
        <label class="switch" title="Test .env, .git/HEAD, .gitignore, package.json">
          <input type="checkbox" id="advancedScanToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <p class="hint">These requests may sometimes be logged by the target server.</p>
      <div id="advancedResults" class="results hidden"></div>
    </div>

    <div class="advanced-section">
      <div class="advanced-header">
        <span class="section-title">JS Source Maps</span>
        <label class="switch" title="Look for .js.map files of loaded scripts">
          <input type="checkbox" id="sourceMapScanToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <p class="hint">May reveal unminified source code of the scripts.</p>
      <div id="sourceMapResults" class="results hidden"></div>
    </div>

    <div class="advanced-section">
      <div class="advanced-header">
        <span class="section-title">Custom Recon</span>
        <label class="switch" title="Test your own paths">
          <input type="checkbox" id="customScanToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div id="customBody" class="hidden">
        <p class="hint">One path per line (e.g. /backup).</p>
        <textarea id="customTargetsTextarea" class="custom-textarea" rows="3" placeholder="/backup-2024.zip&#10;/old-admin/"></textarea>
        <button id="saveCustomBtn" class="scan-btn" type="button">Save</button>
        <div id="customResults" class="results hidden"></div>
      </div>
    </div>

    <footer>
      <span id="statusText">Loading…</span>
      <a class="credit" href="https://github.com/camael-off" target="_blank" rel="noopener noreferrer">by Camael</a>
    </footer>

    <script src="popup.js" type="module"></script>
  </body>
</html>
